# ────────────────────────────────────────────────
#  FakeGuard — docker compose up --build
#  После запуска: http://localhost
#  Логин: admin / admin123
# ────────────────────────────────────────────────

x-backend-env: &backend-env
  environment:
    DEBUG: "True"
    SECRET_KEY: "fakeguard-dev-secret-key-change-in-production"
    REDIS_URL: "redis://redis:6379/0"
    DB_PATH: "/app/data/db.sqlite3"
    MONITORED_COMPANY: "Яндекс"
    # Gemini AI — анализ статей (оставь пустым для keyword-fallback)
    GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    # Telegram Bot — уведомления и команды
    TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
    TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"

x-backend-volumes: &backend-volumes
  volumes:
    - db_data:/app/data
    - media_data:/app/media

services:

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Django Backend ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    <<: [*backend-env, *backend-volumes]
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/app/docker_entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/admin/login/"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Celery Worker ─────────────────────────────
  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    <<: [*backend-env, *backend-volumes]
    depends_on:
      backend:
        condition: service_healthy
    command: celery -A config worker -l info -c 2

  # ── Celery Beat ───────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    <<: [*backend-env, *backend-volumes]
    depends_on:
      backend:
        condition: service_healthy
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Telegram Bot ──────────────────────────────
  # Запускается только если TELEGRAM_BOT_TOKEN задан
  telegram-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    <<: [*backend-env, *backend-volumes]
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "
        if [ -z \"$$TELEGRAM_BOT_TOKEN\" ]; then
          echo '⚠️  TELEGRAM_BOT_TOKEN не задан. Telegram Bot не запущен.';
          echo '   Добавь токен в .env и перезапусти: docker compose up -d telegram-bot';
          sleep infinity;
        else
          python manage.py run_telegram_bot;
        fi
      "

  # ── Nginx + React ─────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"   # host Nginx проксирует сюда
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
  media_data:
