# /etc/nginx/sites-available/fakeguard
# Host Nginx — SSL termination + proxy to Docker (port 8080)
#
# Установка:
#   sudo cp docker/nginx-host.conf /etc/nginx/sites-available/fakeguard
#   sudo ln -s /etc/nginx/sites-available/fakeguard /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d sduclubs.asia -d www.sduclubs.asia
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name sduclubs.asia www.sduclubs.asia;

    # certbot будет добавлять сюда redirect на HTTPS
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sduclubs.asia www.sduclubs.asia;

    # SSL сертификаты (certbot заполнит автоматически)
    ssl_certificate /etc/letsencrypt/live/sduclubs.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sduclubs.asia/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Proxy to Docker
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
